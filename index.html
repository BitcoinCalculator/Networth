<!DOCTYPE html> 
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DART Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0f17;
      --panel:#121a25;
      --panel-2:#182231;
      --border:rgba(255,255,255,.08);
      --text:#ecf3ff;
      --muted:#9fb0c8;
      --primary:#5ea8ff;
      --shadow:0 18px 50px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(180deg,#091019 0%, #060a10 100%);
      color:var(--text);
      min-height:100vh;
      padding:12px;
      -webkit-font-smoothing:antialiased;
    }
    a{text-decoration:none;color:inherit}
    .wrap{
      max-width:760px;
      margin:0 auto;
    }
    .top{
      margin-bottom:10px;
    }
    .title{
      font-size:24px;
      font-weight:900;
      letter-spacing:-.04em;
      line-height:1.05;
    }
    .sub{
      margin-top:2px;
      color:var(--muted);
      font-size:12px;
    }
    .panel{
      background:linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--border);
      border-radius:18px;
      padding:12px;
      box-shadow:var(--shadow);
    }
    .tool-list{
      display:grid;
      gap:8px;
    }
    .tool-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      transition:transform .15s ease, border-color .15s ease, background .15s ease;
    }
    .tool-item:hover{
      transform:translateY(-1px);
      border-color:rgba(94,168,255,.35);
      background:rgba(94,168,255,.08);
    }
    .tool-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .tool-icon{
      width:38px;
      height:38px;
      border-radius:12px;
      display:grid;
      place-items:center;
      flex-shrink:0;
      font-size:17px;
      background:linear-gradient(135deg, rgba(94,168,255,.16), rgba(94,168,255,.08));
      border:1px solid rgba(94,168,255,.18);
    }
    .tool-text{
      min-width:0;
    }
    .tool-title{
      font-size:14px;
      font-weight:800;
      color:#eff5ff;
      line-height:1.25;
    }
    .tool-meta{
      font-size:11px;
      color:var(--muted);
      line-height:1.35;
      margin-top:2px;
    }
    .tool-arrow{
      flex-shrink:0;
      font-size:16px;
      color:var(--primary);
    }

    @media (max-width:520px){
      body{padding:10px}
      .title{font-size:22px}
      .sub{font-size:11px}
      .panel{padding:10px}
      .tool-item{padding:10px}
      .tool-icon{
        width:34px;
        height:34px;
        font-size:15px;
      }
      .tool-title{font-size:13px}
      .tool-meta{font-size:10px}
      .tool-arrow{font-size:14px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">DART Tools</div>
      <div class="sub">Clinical calculator index</div>
    </div>

    <section class="panel">
      <div class="tool-list" id="toolList"></div>
    </section>
  </div>

  <script>
    const tools = [
      {
        title: "Plasmapheresis",
        description: "Procedure and exchange calculations",
        href: "plasmapheresis.html",
        icon: "🩸"
      },
      {
        title: "RBC Exchange",
        description: "RBCx planning tools",
        href: "rbcx.html",
        icon: "🔴"
      },
      {
        title: "Stem Cell Collection",
        description: "Collection planning tools",
        href: "stem-cell-collection.html",
        icon: "🧬"
      },
      {
        title: "WBC Depletion",
        description: "Depletion workflow calculators",
        href: "white-blood-cell-depletion.html",
        icon: "⚪"
      },
      {
        title: "LDL Apheresis",
        description: "LDL treatment tools",
        href: "ldl-apheresis.html",
        icon: "🫀"
      },
      {
        title: "Photopheresis",
        description: "Photopheresis support tools",
        href: "extracorporeal-photopheresis.html",
        icon: "☀️"
      }
    ];

    function createToolCard(tool){
      const a = document.createElement('a');
      a.className = 'tool-item';
      a.href = tool.href;
      a.innerHTML = `
        <div class="tool-left">
          <div class="tool-icon">${tool.icon}</div>
          <div class="tool-text">
            <div class="tool-title">${tool.title}</div>
            <div class="tool-meta">${tool.description}</div>
          </div>
        </div>
        <div class="tool-arrow">→</div>
      `;
      return a;
    }

    const toolList = document.getElementById('toolList');
    tools.forEach(tool => toolList.appendChild(createToolCard(tool)));
  </script>
</body>
</html>
