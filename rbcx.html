<script>
  const state = {
    heightMode: 'cm',
    weightMode: 'kg',
    weightBasis: 'actual'
  };

  const el = {
    sex: document.getElementById('sex'),
    hct: document.getElementById('hct'),
    exchangeFluidHct: document.getElementById('exchangeFluidHct'),
    targetHct: document.getElementById('targetHct'),
    fcr: document.getElementById('fcr'),
    warmerVolume: document.getElementById('warmerVolume'),
    heightCm: document.getElementById('heightCm'),
    heightFt: document.getElementById('heightFt'),
    heightIn: document.getElementById('heightIn'),
    weightKg: document.getElementById('weightKg'),
    weightLb: document.getElementById('weightLb'),
    results: document.getElementById('results'),
    calculateBtn: document.getElementById('calculateBtn'),
    resetBtn: document.getElementById('resetBtn'),
    heightMetricBtn: document.getElementById('heightMetricBtn'),
    heightEnglishBtn: document.getElementById('heightEnglishBtn'),
    weightMetricBtn: document.getElementById('weightMetricBtn'),
    weightEnglishBtn: document.getElementById('weightEnglishBtn'),
    heightCmWrap: document.getElementById('heightCmWrap'),
    heightEnglishWrap: document.getElementById('heightEnglishWrap'),
    weightKgWrap: document.getElementById('weightKgWrap'),
    weightLbWrap: document.getElementById('weightLbWrap'),
    ibwUseWrap: document.getElementById('ibwUseWrap'),
    actualBasisBtn: document.getElementById('actualBasisBtn'),
    ibwBasisBtn: document.getElementById('ibwBasisBtn')
  };

  function setActive(buttons, activeButton) {
    buttons.forEach(function (btn) {
      btn.classList.remove('active');
    });
    activeButton.classList.add('active');
  }

  function fmt(num, digits) {
    if (digits === undefined) digits = 1;
    return Number(num).toLocaleString(undefined, {
      minimumFractionDigits: digits,
      maximumFractionDigits: digits
    });
  }

  function heightToCm() {
    if (state.heightMode === 'cm') {
      return parseFloat(el.heightCm.value);
    }
    const ft = parseFloat(el.heightFt.value || 0);
    const inches = parseFloat(el.heightIn.value || 0);
    return ((ft * 12) + inches) * 2.54;
  }

  function heightToInches() {
    return heightToCm() / 2.54;
  }

  function weightToKg() {
    if (state.weightMode === 'kg') {
      return parseFloat(el.weightKg.value);
    }
    return parseFloat(el.weightLb.value) * 0.45359237;
  }

  function devineIBWKg(sex, heightInches) {
    if (sex === 'male') {
      return 50 + 2.3 * (heightInches - 60);
    }
    return 45.5 + 2.3 * (heightInches - 60);
  }

  function nadlerTBVml(sex, heightCm, weightKg) {
    const h = heightCm / 100;
    if (sex === 'male') {
      return 604 + (367 * Math.pow(h, 3)) + (32.2 * weightKg);
    }
    return 183 + (356 * Math.pow(h, 3)) + (33.1 * weightKg);
  }

  function validatePositive(value, name) {
    if (!Number.isFinite(value) || value <= 0) {
      throw new Error('Enter valid ' + name + '.');
    }
  }

  function createResultHTML(data) {
    const calciumMg = data.estimatedPrbcMl * 0.8;
    const calciumMl = calciumMg / 100;

    let bmiNote = '';
    if (data.bmi > 30) {
      bmiNote =
        '<div class="note warn">BMI &gt; 30. Current calculation uses <strong>' +
        data.weightBasisLabel +
        '</strong>.</div>';
    }

    return (
      '<div class="result-card">' +
        '<div class="result-kicker">Estimated PRBC Volume</div>' +
        '<div class="result-value">' + fmt(data.estimatedPrbcMl) + ' <span style="font-size:.42em;color:var(--muted);font-weight:800">mL</span></div>' +
        '<div class="result-meta">Planning estimate</div>' +
      '</div>' +

      '<div class="mini-grid">' +
        '<div class="result-card">' +
          '<div class="result-kicker">TBV</div>' +
          '<div class="result-value">' + fmt(data.tbvMl) + ' <span style="font-size:.42em;color:var(--muted);font-weight:800">mL</span></div>' +
          '<div class="result-meta">' + data.weightBasisLabel + '</div>' +
        '</div>' +
        '<div class="result-card">' +
          '<div class="result-kicker">Effective TBV</div>' +
          '<div class="result-value">' + fmt(data.effectiveTbvMl) + ' <span style="font-size:.42em;color:var(--muted);font-weight:800">mL</span></div>' +
          '<div class="result-meta">TBV minus warmer/tubing volume</div>' +
        '</div>' +
      '</div>' +

      '<div class="mini-grid">' +
        '<div class="result-card">' +
          '<div class="result-kicker">BMI</div>' +
          '<div class="result-value">' + fmt(data.bmi, 1) + '</div>' +
          '<div class="result-meta">IBW: ' + fmt(data.ibwKg) + ' kg / ' + fmt(data.ibwLb) + ' lb</div>' +
        '</div>' +
        '<div class="result-card">' +
          '<div class="result-kicker">Calcium Gluconate</div>' +
          '<div class="result-value">' + fmt(calciumMl) + ' <span style="font-size:.42em;color:var(--muted);font-weight:800">mL</span></div>' +
          '<div class="result-meta">' + fmt(calciumMg) + ' mg total</div>' +
        '</div>' +
      '</div>' +

      '<div class="math-box">' +
        '<div class="calc-line"><strong>Formula</strong></div>' +
        '<div class="calc-line">Effective TBV = TBV − warmer volume</div>' +
        '<div class="calc-line">Average Hct = (Pre Hct + Target Hct) ÷ 2</div>' +
        '<div class="calc-line">PRBC volume = Effective TBV × (Average Hct ÷ Exchange Fluid Hct) × ln(100 ÷ FCR)</div>' +
        '<div class="calc-line">Effective TBV = ' + fmt(data.tbvMl) + ' − ' + fmt(data.warmerVolumeMl) + ' = ' + fmt(data.effectiveTbvMl) + ' mL</div>' +
        '<div class="calc-line">Average Hct = (' + fmt(data.preHctPercent, 1) + ' + ' + fmt(data.targetHctPercent, 1) + ') ÷ 2 = ' + fmt(data.averageHctPercent, 1) + '%</div>' +
        '<div class="calc-line"><strong>' + fmt(data.effectiveTbvMl) + ' × (' + fmt(data.averageHctPercent, 1) + ' ÷ ' + fmt(data.exchangeFluidHctPercent, 1) + ') × ln(100 ÷ ' + fmt(data.fcrPercent, 1) + ') = ' + fmt(data.estimatedPrbcMl) + ' mL</strong></div>' +
      '</div>' +

      bmiNote +

      '<div class="note red">Planning estimate only. Confirm with physician order and local protocol.</div>'
    );
  }

  function calculate() {
    try {
      const sex = el.sex.value;
      const preHctPercent = parseFloat(el.hct.value);
      const exchangeFluidHctPercent = parseFloat(el.exchangeFluidHct.value);
      const targetHctPercent = parseFloat(el.targetHct.value);
      const fcrPercent = parseFloat(el.fcr.value);
      const warmerVolumeMl = parseFloat(el.warmerVolume.value);
      const heightCm = heightToCm();
      const weightKgActual = weightToKg();
      const heightInches = heightToInches();

      if (!sex) throw new Error('Select sex.');
      validatePositive(preHctPercent, 'pre Hct');
      validatePositive(exchangeFluidHctPercent, 'exchange fluid Hct');
      validatePositive(targetHctPercent, 'target Hct');
      validatePositive(fcrPercent, 'FCR');
      validatePositive(heightCm, 'height');
      validatePositive(weightKgActual, 'weight');

      if (
        preHctPercent >= 100 ||
        exchangeFluidHctPercent >= 100 ||
        targetHctPercent >= 100 ||
        fcrPercent >= 100
      ) {
        throw new Error('Percent values must be under 100.');
      }

      if (warmerVolumeMl < 0) {
        throw new Error('Warmer volume cannot be negative.');
      }

      const bmi = weightKgActual / Math.pow(heightCm / 100, 2);
      const ibwKg = devineIBWKg(sex, heightInches);
      const ibwLb = ibwKg / 0.45359237;

      if (bmi > 30) {
        el.ibwUseWrap.classList.remove('hidden');
      } else {
        el.ibwUseWrap.classList.add('hidden');
        state.weightBasis = 'actual';
        setActive([el.actualBasisBtn, el.ibwBasisBtn], el.actualBasisBtn);
      }

      const calculationWeightKg =
        (bmi > 30 && state.weightBasis === 'ibw') ? ibwKg : weightKgActual;

      const tbvMl = nadlerTBVml(sex, heightCm, calculationWeightKg);
      const effectiveTbvMl = tbvMl - warmerVolumeMl;

      if (effectiveTbvMl <= 0) {
        throw new Error('Effective TBV is not positive.');
      }

      const averageHctPercent = (preHctPercent + targetHctPercent) / 2;

      const estimatedPrbcMl =
        effectiveTbvMl *
        (averageHctPercent / exchangeFluidHctPercent) *
        Math.log(100 / fcrPercent);

      if (!Number.isFinite(estimatedPrbcMl) || estimatedPrbcMl <= 0) {
        throw new Error('Calculated PRBC volume is not positive.');
      }

      el.results.innerHTML = createResultHTML({
        bmi: bmi,
        ibwKg: ibwKg,
        ibwLb: ibwLb,
        tbvMl: tbvMl,
        effectiveTbvMl: effectiveTbvMl,
        estimatedPrbcMl: estimatedPrbcMl,
        preHctPercent: preHctPercent,
        exchangeFluidHctPercent: exchangeFluidHctPercent,
        targetHctPercent: targetHctPercent,
        fcrPercent: fcrPercent,
        averageHctPercent: averageHctPercent,
        warmerVolumeMl: warmerVolumeMl,
        weightBasisLabel:
          (bmi > 30 && state.weightBasis === 'ibw')
            ? 'Ideal Body Weight'
            : 'Entered Weight'
      });

    } catch (err) {
      el.results.innerHTML =
        '<div class="result-card">' +
          '<div class="result-kicker">Error</div>' +
          '<div class="result-value" style="font-size:24px">Unable to calculate</div>' +
          '<div class="result-meta">' + err.message + '</div>' +
        '</div>';
    }
  }

  function resetForm() {
    el.sex.value = '';
    el.hct.value = '';
    el.exchangeFluidHct.value = '55';
    el.targetHct.value = '30';
    el.fcr.value = '30';
    el.warmerVolume.value = '30';
    el.heightCm.value = '';
    el.heightFt.value = '';
    el.heightIn.value = '';
    el.weightKg.value = '';
    el.weightLb.value = '';

    state.heightMode = 'cm';
    state.weightMode = 'kg';
    state.weightBasis = 'actual';

    el.ibwUseWrap.classList.add('hidden');

    setActive([el.heightMetricBtn, el.heightEnglishBtn], el.heightMetricBtn);
    setActive([el.weightMetricBtn, el.weightEnglishBtn], el.weightMetricBtn);
    setActive([el.actualBasisBtn, el.ibwBasisBtn], el.actualBasisBtn);

    el.heightCmWrap.classList.remove('hidden');
    el.heightEnglishWrap.classList.add('hidden');
    el.weightKgWrap.classList.remove('hidden');
    el.weightLbWrap.classList.add('hidden');

    el.results.innerHTML =
      '<div class="result-card">' +
        '<div class="result-kicker">Ready</div>' +
        '<div class="result-value">—</div>' +
        '<div class="result-meta">Enter values and calculate.</div>' +
      '</div>';
  }

  el.heightMetricBtn.addEventListener('click', function () {
    state.heightMode = 'cm';
    setActive([el.heightMetricBtn, el.heightEnglishBtn], el.heightMetricBtn);
    el.heightCmWrap.classList.remove('hidden');
    el.heightEnglishWrap.classList.add('hidden');
  });

  el.heightEnglishBtn.addEventListener('click', function () {
    state.heightMode = 'ftin';
    setActive([el.heightMetricBtn, el.heightEnglishBtn], el.heightEnglishBtn);
    el.heightCmWrap.classList.add('hidden');
    el.heightEnglishWrap.classList.remove('hidden');
  });

  el.weightMetricBtn.addEventListener('click', function () {
    state.weightMode = 'kg';
    setActive([el.weightMetricBtn, el.weightEnglishBtn], el.weightMetricBtn);
    el.weightKgWrap.classList.remove('hidden');
    el.weightLbWrap.classList.add('hidden');
  });

  el.weightEnglishBtn.addEventListener('click', function () {
    state.weightMode = 'lb';
    setActive([el.weightMetricBtn, el.weightEnglishBtn], el.weightEnglishBtn);
    el.weightKgWrap.classList.add('hidden');
    el.weightLbWrap.classList.remove('hidden');
  });

  el.actualBasisBtn.addEventListener('click', function () {
    state.weightBasis = 'actual';
    setActive([el.actualBasisBtn, el.ibwBasisBtn], el.actualBasisBtn);
  });

  el.ibwBasisBtn.addEventListener('click', function () {
    state.weightBasis = 'ibw';
    setActive([el.actualBasisBtn, el.ibwBasisBtn], el.ibwBasisBtn);
  });

  el.calculateBtn.addEventListener('click', calculate);
  el.resetBtn.addEventListener('click', resetForm);
</script>
