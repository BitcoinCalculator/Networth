<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RBC Exchange Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0f17;
      --panel:#121a25;
      --panel2:#182231;
      --border:rgba(255,255,255,.08);
      --text:#ecf3ff;
      --muted:#9fb0c8;
      --primary:#5ea8ff;
      --warn:#ffe2a3;
      --danger:#ffb0b0;
      --shadow:0 18px 50px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(180deg,#091019 0%, #060a10 100%);
      color:var(--text);
      min-height:100vh;
      padding:16px;
      -webkit-font-smoothing:antialiased;
    }
    .wrap{max-width:1080px;margin:0 auto}
    .top{margin-bottom:14px}
    .title{
      font-size:clamp(28px,5vw,42px);
      font-weight:900;
      letter-spacing:-.04em;
      line-height:1.05;
    }
    .sub{
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
    }
    .grid{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:16px;
    }
    .panel{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid var(--border);
      border-radius:20px;
      padding:18px;
      box-shadow:var(--shadow);
    }
    .panel-title{
      font-size:17px;
      font-weight:800;
      margin-bottom:14px;
    }
    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:7px;
    }
    .field.full{grid-column:1 / -1}
    .label{
      font-size:11px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--muted);
    }
    input,select,button{font:inherit}
    input,select{
      width:100%;
      min-height:48px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      padding:0 14px;
      outline:none;
    }
    input:focus,select:focus{
      border-color:rgba(94,168,255,.55);
      box-shadow:0 0 0 4px rgba(94,168,255,.12);
    }
    input::placeholder{color:#6f829e}
    .toggle-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .toggle-btn{
      min-height:42px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      font-weight:800;
      cursor:pointer;
    }
    .toggle-btn.active{
      background:linear-gradient(135deg, rgba(94,168,255,.18), rgba(94,168,255,.08));
      border-color:rgba(94,168,255,.35);
    }
    .sub-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:18px;
    }
    .btn{
      min-height:48px;
      padding:0 18px;
      border-radius:12px;
      border:1px solid transparent;
      font-weight:800;
      cursor:pointer;
    }
    .btn-primary{
      background:linear-gradient(135deg,var(--primary),#3f84e8);
      color:#fff;
    }
    .btn-secondary{
      background:rgba(255,255,255,.03);
      color:var(--text);
      border-color:var(--border);
    }
    .note{
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      border-radius:14px;
      padding:12px 14px;
      font-size:13px;
      line-height:1.55;
      color:#dce8fa;
    }
    .note.warn{
      border-color:rgba(255,226,163,.2);
      background:rgba(255,226,163,.08);
      color:var(--warn);
    }
    .note.red{
      border-color:rgba(255,176,176,.18);
      background:rgba(255,176,176,.08);
      color:var(--danger);
    }
    .result-stack{
      display:grid;
      gap:12px;
    }
    .result-card{
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      background:rgba(255,255,255,.03);
    }
    .result-kicker{
      font-size:11px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--muted);
      margin-bottom:8px;
    }
    .result-value{
      font-size:clamp(24px,4vw,38px);
      font-weight:900;
      line-height:1;
      letter-spacing:-.04em;
      margin-bottom:8px;
    }
    .result-meta{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }
    .mini-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .math-box{
      border:1px solid rgba(94,168,255,.18);
      background:rgba(94,168,255,.06);
      border-radius:16px;
      padding:14px;
      font-size:13px;
      line-height:1.7;
      color:#dce9ff;
    }
    .calc-line{
      padding:8px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .calc-line:last-child{border-bottom:none}
    .hidden{display:none !important}
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
    }
    @media (max-width:700px){
      body{padding:12px}
      .form-grid,.sub-grid,.mini-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">RBC Exchange Calculator</div>
      <div class="sub">Estimated PRBC volume for exchange planning</div>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panel-title">Inputs</div>

        <div class="form-grid">
          <div class="field">
            <label class="label" for="sex">Sex</label>
            <select id="sex">
              <option value="">Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>

          <div class="field">
            <label class="label" for="hct">Pre Hct %</label>
            <input id="hct" type="number" step="0.1" min="0" placeholder="25">
          </div>

          <div class="field full">
            <label class="label">Height Unit</label>
            <div class="toggle-row">
              <button class="toggle-btn active" type="button" id="heightMetricBtn">cm</button>
              <button class="toggle-btn" type="button" id="heightEnglishBtn">ft + in</button>
            </div>
          </div>

          <div class="field" id="heightCmWrap">
            <label class="label" for="heightCm">Height (cm)</label>
            <input id="heightCm" type="number" step="0.1" min="0" placeholder="170">
          </div>

          <div class="field full hidden" id="heightEnglishWrap">
            <label class="label">Height (ft + in)</label>
            <div class="sub-grid">
              <input id="heightFt" type="number" step="1" min="0" placeholder="Feet">
              <input id="heightIn" type="number" step="0.1" min="0" placeholder="Inches">
            </div>
          </div>

          <div class="field full">
            <label class="label">Weight Unit</label>
            <div class="toggle-row">
              <button class="toggle-btn active" type="button" id="weightMetricBtn">kg</button>
              <button class="toggle-btn" type="button" id="weightEnglishBtn">lb</button>
            </div>
          </div>

          <div class="field" id="weightKgWrap">
            <label class="label" for="weightKg">Weight (kg)</label>
            <input id="weightKg" type="number" step="0.1" min="0" placeholder="70">
          </div>

          <div class="field hidden" id="weightLbWrap">
            <label class="label" for="weightLb">Weight (lb)</label>
            <input id="weightLb" type="number" step="0.1" min="0" placeholder="154">
          </div>

          <div class="field">
            <label class="label" for="exchangeFluidHct">Exchange Fluid Hct %</label>
            <input id="exchangeFluidHct" type="number" step="0.1" min="0" value="55">
          </div>

          <div class="field">
            <label class="label" for="targetHct">Target Hct %</label>
            <input id="targetHct" type="number" step="0.1" min="0" value="30">
          </div>

          <div class="field">
            <label class="label" for="fcr">FCR %</label>
            <input id="fcr" type="number" step="0.1" min="0" value="30">
          </div>

          <div class="field">
            <label class="label" for="warmerVolume">Warmer / Tubing Volume (mL)</label>
            <input id="warmerVolume" type="number" step="0.1" min="0" value="30">
          </div>

          <div class="field full hidden" id="ibwUseWrap">
            <div class="note warn">BMI &gt; 30. Choose weight basis.</div>
            <div style="height:10px"></div>
            <label class="label">Weight Basis</label>
            <div class="toggle-row">
              <button class="toggle-btn active" type="button" id="actualBasisBtn">Entered Weight</button>
              <button class="toggle-btn" type="button" id="ibwBasisBtn">Ideal Body Weight</button>
            </div>
          </div>

          <div class="field full">
            <div class="note">Planning tool only. Final orders are physician-directed.</div>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="calculateBtn" type="button">Calculate</button>
          <button class="btn btn-secondary" id="resetBtn" type="button">Reset</button>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-title">Results</div>
        <div class="result-stack" id="results">
          <div class="result-card">
            <div class="result-kicker">Ready</div>
            <div class="result-value">—</div>
            <div class="result-meta">Enter values and calculate.</div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const state = {
      heightMode: 'cm',
      weightMode: 'kg',
      weightBasis: 'actual'
    };

    const el = {
      sex: document.getElementById('sex'),
      hct: document.getElementById('hct'),
      exchangeFluidHct: document.getElementById('exchangeFluidHct'),
      targetHct: document.getElementById('targetHct'),
      fcr: document.getElementById('fcr'),
      warmerVolume: document.getElementById('warmerVolume'),
      heightCm: document.getElementById('heightCm'),
      heightFt: document.getElementById('heightFt'),
      heightIn: document.getElementById('heightIn'),
      weightKg: document.getElementById('weightKg'),
      weightLb: document.getElementById('weightLb'),
      results: document.getElementById('results'),
      calculateBtn: document.getElementById('calculateBtn'),
      resetBtn: document.getElementById('resetBtn'),
      heightMetricBtn: document.getElementById('heightMetricBtn'),
      heightEnglishBtn: document.getElementById('heightEnglishBtn'),
      weightMetricBtn: document.getElementById('weightMetricBtn'),
      weightEnglishBtn: document.getElementById('weightEnglishBtn'),
      heightCmWrap: document.getElementById('heightCmWrap'),
      heightEnglishWrap: document.getElementById('heightEnglishWrap'),
      weightKgWrap: document.getElementById('weightKgWrap'),
      weightLbWrap: document.getElementById('weightLbWrap'),
      ibwUseWrap: document.getElementById('ibwUseWrap'),
      actualBasisBtn: document.getElementById('actualBasisBtn'),
      ibwBasisBtn: document.getElementById('ibwBasisBtn')
    };

    function setActive(buttons, activeButton) {
      buttons.forEach(function(btn) {
        btn.classList.remove('active');
      });
      activeButton.classList.add('active');
    }
